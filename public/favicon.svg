<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1e293b"/>
  <!-- Grid lines -->
  <line x1="34" y1="10" x2="34" y2="90" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="66" y1="10" x2="66" y2="90" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="10" y1="34" x2="90" y2="34" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="10" y1="66" x2="90" y2="66" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- X in top-left cell -->
  <line x1="15" y1="15" x2="28" y2="28" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
  <line x1="28" y1="15" x2="15" y2="28" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
  <!-- O in center cell -->
  <circle cx="50" cy="50" r="9" fill="none" stroke="#f472b6" stroke-width="4"/>
  <!-- X in bottom-right cell -->
  <line x1="72" y1="72" x2="85" y2="85" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
  <line x1="85" y1="72" x2="72" y2="85" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
</svg>
